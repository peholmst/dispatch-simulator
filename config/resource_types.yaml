- id: incident_commander
  service: fire_rescue
  capabilities:
    command: 1
    first_response: 1
  crew:
    min: 1
    default: 1
    max: 2
  turnout:
    delaySeconds: [30, 90]
    priorityModifiers:
      A: 0.7
      B: 0.85
      C: 1
      D: 1.2
  travel:
    timeMultiplier: 1
  recovery:
    afterIncidentSeconds: [120, 300]
